# payments — shop-app's real downstream dependency (source in payments/app.js, mounted via the
# kustomize-generated payments-src ConfigMap). The incident is taking THIS down for real
# (scale to 0) so shop-app's checkout calls actually fail; the fix is scaling it back up.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments
  namespace: demo
  labels: { app: payments }
spec:
  replicas: 1
  selector:
    matchLabels: { app: payments }
  template:
    metadata:
      labels: { app: payments }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: payments
          image: node:22-alpine
          command: ["node", "/app/app.js"]
          ports:
            - { name: http, containerPort: 8080 }
          readinessProbe: { httpGet: { path: /healthz, port: 8080 }, initialDelaySeconds: 2, periodSeconds: 5 }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { cpu: 100m, memory: 96Mi }
          volumeMounts:
            - { name: src, mountPath: /app }
      volumes:
        - name: src
          configMap: { name: payments-src }
---
apiVersion: v1
kind: Service
metadata:
  name: payments
  namespace: demo
  labels: { app: payments }
spec:
  selector: { app: payments }
  ports:
    - { name: http, port: 8080, targetPort: 8080 }
