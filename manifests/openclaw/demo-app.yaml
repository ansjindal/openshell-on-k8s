# Part VI capstone — a tiny sample app the SRE fleet investigates. The website's
# /api/incident route deploys it, injects a fault (a non-existent image tag → the new
# ReplicaSet can't roll out, so the Deployment goes unhealthy and kube-state-metrics +
# events light up for the fleet to find), reports health, and reverts the fault on
# human approval. In production this break/fix would be a git change ArgoCD syncs.
apiVersion: v1
kind: Namespace
metadata: { name: demo }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shop
  namespace: demo
  labels: { app: shop, app.kubernetes.io/part-of: capstone }
spec:
  replicas: 2
  selector: { matchLabels: { app: shop } }
  template:
    metadata: { labels: { app: shop } }
    spec:
      containers:
        - name: web
          image: nginxinc/nginx-unprivileged:stable
          ports: [ { containerPort: 8080 } ]
          readinessProbe: { httpGet: { path: /, port: 8080 }, initialDelaySeconds: 3, periodSeconds: 5 }
          resources: { requests: { cpu: 25m, memory: 32Mi }, limits: { memory: 128Mi } }
---
apiVersion: v1
kind: Service
metadata: { name: shop, namespace: demo, labels: { app: shop } }
spec:
  selector: { app: shop }
  ports: [ { name: http, port: 80, targetPort: 8080 } ]
