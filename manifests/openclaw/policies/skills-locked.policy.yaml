# The "locked" production posture for a skills sandbox: its ONLY install egress is the
# in-cluster Verdaccio registry (registry.openshell.svc.cluster.local:4873). ClawHub and
# direct public npm are denied at the seal — the registry is the single, auditable source.
#
#   openshell policy set agent-0 --policy manifests/openclaw/policies/skills-locked.policy.yaml --wait
#
# A bare `openshell sandbox create` gives an agent the gateway's generic DEFAULT policy (which
# has no registry rule at all) — so skill installs/publishes are denied until you apply this.
version: 1
filesystem_policy:
  include_workdir: true
  read_only: [/usr, /lib, /proc, /dev/urandom, /app, /etc, /var/log]
  read_write: [/sandbox, /tmp, /dev/null]
landlock: { compatibility: best_effort }
process: { run_as_user: sandbox, run_as_group: sandbox }
network_policies:
  in-cluster-registry:
    name: in-cluster-registry
    # access: full + protocol: rest + allow_encoded_slash lets npm fetch SCOPED names
    # (@workshop/x → /@workshop%2Fx) — the %2F that strict path parsing rejects by default
    # (a path-traversal / request-smuggling guard). allow_encoded_slash is NOT settable via
    # `openshell policy update --add-endpoint`; it only lives in policy YAML like this.
    # Verdaccio uplinks npmjs server-side and caches transitive deps, so @workshop installs
    # never need the agent to reach public npm directly.
    endpoints:
      - { host: registry.openshell.svc.cluster.local, port: 4873, access: full, protocol: rest, allow_encoded_slash: true }
    binaries: [ { path: /usr/bin/npm }, { path: /usr/local/bin/npm }, { path: /usr/bin/node }, { path: /usr/local/bin/node } ]
