# kubernetes-event-exporter → Loki. Ships cluster events (e.g. "Failed to pull image …") into
# Loki as a log stream, so the fleet's `events` agent can read them with the SAME governed
# Loki egress the logs agent uses — no K8s API access in the sandbox. Also gives Loki real
# content (otherwise it's empty — which is why the logs agent sees series=0).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: event-exporter
  namespace: monitoring
---
# event-exporter watches events AND reads the involved objects (pods, replicasets, …) to enrich
# each event — so it needs cluster-wide READ. The built-in, read-only `view` ClusterRole is
# exactly that (no write, no secrets), keeping the blast radius minimal.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: event-exporter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - kind: ServiceAccount
    name: event-exporter
    namespace: monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: event-exporter-cfg
  namespace: monitoring
data:
  config.yaml: |
    logLevel: error
    logFormat: json
    route:
      routes:
        - match:
            - receiver: loki
    receivers:
      - name: loki
        loki:
          url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push
          streamLabels:
            job: kubernetes-event-exporter
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-exporter
  namespace: monitoring
  labels: { app: event-exporter }
spec:
  replicas: 1
  selector:
    matchLabels: { app: event-exporter }
  template:
    metadata:
      labels: { app: event-exporter }
    spec:
      serviceAccountName: event-exporter
      securityContext:
        runAsNonRoot: true
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: event-exporter
          image: ghcr.io/resmoio/kubernetes-event-exporter:v1.7
          args: ["-conf=/data/config.yaml"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { cpu: 100m, memory: 128Mi }
          volumeMounts:
            - name: cfg
              mountPath: /data
      volumes:
        - name: cfg
          configMap: { name: event-exporter-cfg }
