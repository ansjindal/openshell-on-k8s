---
# Copy to secrets.yml (gitignored) OR pass these with -e on the command line.
# Prefer ansible-vault for anything you commit. secrets.yml is the place for
# environment-specific values (private endpoints, model lists, keys) so they
# never land in the public defaults (group_vars/all.yml).

# Required: API key for your upstream OpenAI-compatible endpoint.
upstream_api_key: "REPLACE_ME"

# Optional: override the endpoint + served models for your environment.
# (Defaults in all.yml point at the public NVIDIA API Catalog.)
# upstream_base_url: "https://your-endpoint.example.com/v1"
# litellm_models:
#   - name: "your/model-id"
#     model: "your/model-id"

# Optional: extra keys referenced by litellm_models[*].api_key_env.
# litellm_extra_credentials:
#   OPENAI_KEY: "sk-..."

# Optional: PostgreSQL gateway backend. Required when gateway_db_backend=postgres.
# postgres_password: "change-me"

# Optional: Keycloak (OIDC). Required when keycloak_enabled=true.
# keycloak_admin_password: "change-me"
# keycloak_demo_user: "demo"
# keycloak_demo_password: "change-me"
# keycloak_public_url: "https://keycloak.example.com"   # issuer; reachable by gateway pod + browser

# Optional: dashboard SSO client secrets (headlamp_enabled / grafana_oidc_enabled)
# headlamp_client_secret: "change-me"
# grafana_client_secret: "change-me"

# Optional: Incident Desk (incident_desk_enabled=true). The gitea Keycloak client
# secret and the Gitea admin (gitops) password. setup.sh generates + caches these
# in .sso-secrets.env; set them here for a manual ansible-playbook run.
# gitea_client_secret: "change-me"
# gitea_admin_password: "change-me"
