---
# Detect whether this host is on the mesh (mesh_iface present) and, if so,
# record its mesh IP for the k3s role and install the flannel.1 MSS clamp.
# If mesh_iface is absent, this role no-ops and k3s uses the default NIC.

- name: Determine mesh IP (empty when mesh_iface is absent)
  ansible.builtin.set_fact:
    mesh_ip: >-
      {{ ansible_facts[mesh_iface].ipv4.address
         if (mesh_iface in ansible_facts and ansible_facts[mesh_iface].ipv4 is defined)
         else '' }}

- name: Flag mesh presence
  ansible.builtin.set_fact:
    mesh_present: "{{ (mesh_ip | length) > 0 }}"

- name: Report
  ansible.builtin.debug:
    msg: >-
      {{ 'mesh ' ~ mesh_iface ~ ' IP: ' ~ mesh_ip if mesh_present
         else 'no ' ~ mesh_iface ~ ' mesh on this host — single-NIC mode' }}

- name: Mesh networking (TCP MSS clamp on flannel.1)
  when: mesh_present | bool
  block:
    - name: Install MSS clamp script
      ansible.builtin.copy:
        dest: /usr/local/sbin/openshell-flannel-mss-clamp.sh
        mode: "0755"
        content: |
          #!/usr/bin/env bash
          set -e
          for _ in $(seq 1 30); do ip link show flannel.1 >/dev/null 2>&1 && break; sleep 2; done
          # flannel.1 only exists once k3s is up — no-op cleanly if it isn't yet
          # (this unit re-runs after k3s; see the post-k3s play in site.yml).
          ip link show flannel.1 >/dev/null 2>&1 || { echo "flannel.1 not present yet; skipping"; exit 0; }
          for spec in "-o flannel.1" "-i flannel.1"; do
            iptables -t mangle -C FORWARD -p tcp --tcp-flags SYN,RST SYN $spec -j TCPMSS --clamp-mss-to-pmtu 2>/dev/null || \
            iptables -t mangle -A FORWARD -p tcp --tcp-flags SYN,RST SYN $spec -j TCPMSS --clamp-mss-to-pmtu
          done

    - name: Install MSS clamp systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/openshell-flannel-mss-clamp.service
        mode: "0644"
        content: |
          [Unit]
          Description=Clamp cross-node TCP MSS to flannel.1 path MTU (mesh {{ mesh_iface }})
          After=k3s.service k3s-agent.service network-online.target
          Wants=network-online.target
          [Service]
          Type=oneshot
          ExecStart=/usr/local/sbin/openshell-flannel-mss-clamp.sh
          RemainAfterExit=yes
          [Install]
          WantedBy=multi-user.target

    - name: Enable + start MSS clamp
      ansible.builtin.systemd:
        name: openshell-flannel-mss-clamp.service
        daemon_reload: true
        enabled: true
        state: started
