# Values for the Loki Helm chart (grafana/loki), single-binary mode.
# One StatefulSet, filesystem backend — plenty for a demo. Adapted from the
# sibling repo (no openclaw.io/role nodeSelector). Grafana auto-discovers Loki
# as a datasource via the kube-prometheus-stack sidecar is NOT automatic — add
# the Loki datasource in Grafana, or it's wired by the install script.
deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  rulerConfig:
    wal:
      dir: /var/loki/ruler-wal

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: local-path
    accessModes: ["ReadWriteOnce"]
    size: 10Gi

# Disable microservices-mode components.
chunksCache:
  enabled: false
resultsCache:
  enabled: false
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
gateway:
  enabled: false

# kube-prometheus-stack already provides kube-state-metrics; just expose a
# ServiceMonitor for Loki itself so Prometheus scrapes it.
monitoring:
  dashboards:
    enabled: false
  rules:
    enabled: false
  serviceMonitor:
    enabled: true
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
