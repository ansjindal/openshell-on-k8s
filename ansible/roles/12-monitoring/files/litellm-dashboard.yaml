# LiteLLM proxy dashboard. Pulls per-model + per-key telemetry: latency
# distributions, token throughput, request rate, success/failure, queue
# time, spend. Metric names match LiteLLM proxy v1.x prometheus integration
# (see http://localhost:14000/metrics/ to enumerate).
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-litellm
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  litellm.json: |-
    {
      "annotations": {"list": []},
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "reqps"}},
          "gridPos": {"h": 7, "w": 8, "x": 0, "y": 0},
          "id": 1,
          "targets": [
            {"expr": "sum by (requested_model) (rate(litellm_proxy_total_requests_metric_total[1m]))", "legendFormat": "{{requested_model}}"}
          ],
          "title": "Request rate (per model, /v1/*)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "short"}},
          "gridPos": {"h": 7, "w": 8, "x": 8, "y": 0},
          "id": 2,
          "targets": [
            {"expr": "sum by (model) (rate(litellm_total_tokens_metric_total[1m]))", "legendFormat": "total: {{model}}"},
            {"expr": "sum by (model) (rate(litellm_input_tokens_metric_total[1m]))", "legendFormat": "input: {{model}}"},
            {"expr": "sum by (model) (rate(litellm_output_tokens_metric_total[1m]))", "legendFormat": "output: {{model}}"}
          ],
          "title": "Tokens/sec (input / output / total)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0}},
          "gridPos": {"h": 7, "w": 8, "x": 16, "y": 0},
          "id": 3,
          "targets": [
            {"expr": "sum by (model) (litellm_input_tokens_metric_total)", "legendFormat": "{{model}} input"},
            {"expr": "sum by (model) (litellm_output_tokens_metric_total)", "legendFormat": "{{model}} output"},
            {"expr": "sum by (model) (litellm_total_tokens_metric_total)", "legendFormat": "{{model}} total"}
          ],
          "title": "Cumulative tokens (since proxy start)",
          "type": "stat",
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "textMode": "value_and_name", "graphMode": "area"}
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "s"}},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 7},
          "id": 4,
          "targets": [
            {"expr": "histogram_quantile(0.50, sum by (le, model) (rate(litellm_request_total_latency_metric_bucket[5m])))", "legendFormat": "p50: {{model}}"},
            {"expr": "histogram_quantile(0.95, sum by (le, model) (rate(litellm_request_total_latency_metric_bucket[5m])))", "legendFormat": "p95: {{model}}"},
            {"expr": "histogram_quantile(0.99, sum by (le, model) (rate(litellm_request_total_latency_metric_bucket[5m])))", "legendFormat": "p99: {{model}}"}
          ],
          "title": "End-to-end latency (request total, seconds)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "s"}},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 7},
          "id": 5,
          "targets": [
            {"expr": "histogram_quantile(0.50, sum by (le, model) (rate(litellm_llm_api_latency_metric_bucket[5m])))", "legendFormat": "p50 upstream: {{model}}"},
            {"expr": "histogram_quantile(0.95, sum by (le, model) (rate(litellm_llm_api_latency_metric_bucket[5m])))", "legendFormat": "p95 upstream: {{model}}"},
            {"expr": "histogram_quantile(0.99, sum by (le, model) (rate(litellm_llm_api_latency_metric_bucket[5m])))", "legendFormat": "p99 upstream: {{model}}"}
          ],
          "title": "Upstream LLM API latency (proxy → NIM)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "s"}},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 15},
          "id": 6,
          "targets": [
            {"expr": "histogram_quantile(0.50, sum by (le) (rate(litellm_request_queue_time_seconds_bucket[5m])))", "legendFormat": "p50"},
            {"expr": "histogram_quantile(0.95, sum by (le) (rate(litellm_request_queue_time_seconds_bucket[5m])))", "legendFormat": "p95"}
          ],
          "title": "Request queue time (before processing starts)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "ms"}},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 15},
          "id": 7,
          "targets": [
            {"expr": "histogram_quantile(0.50, sum by (le, model) (rate(litellm_overhead_latency_metric_bucket[5m])))", "legendFormat": "p50: {{model}}"},
            {"expr": "histogram_quantile(0.95, sum by (le, model) (rate(litellm_overhead_latency_metric_bucket[5m])))", "legendFormat": "p95: {{model}}"}
          ],
          "title": "LiteLLM overhead (ms added by the proxy)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "reqps"}},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 23},
          "id": 8,
          "targets": [
            {"expr": "sum by (requested_model, status_code) (rate(litellm_proxy_total_requests_metric_total[5m]))", "legendFormat": "{{requested_model}} {{status_code}}"}
          ],
          "title": "Requests by status code",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "short"}},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 23},
          "id": 9,
          "targets": [
            {"expr": "sum by (litellm_model_name) (rate(litellm_deployment_total_requests_total[5m]))", "legendFormat": "total: {{litellm_model_name}}"},
            {"expr": "sum by (litellm_model_name) (rate(litellm_deployment_success_responses_total[5m]))", "legendFormat": "success: {{litellm_model_name}}"},
            {"expr": "sum by (litellm_model_name) (rate(litellm_deployment_failure_responses_total[5m]))", "legendFormat": "failure: {{litellm_model_name}}"}
          ],
          "title": "Deployment success vs failure (per upstream)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "currencyUSD"}},
          "gridPos": {"h": 7, "w": 8, "x": 0, "y": 31},
          "id": 10,
          "targets": [
            {"expr": "sum by (model) (increase(litellm_spend_metric_total[24h]))", "legendFormat": "{{model}}"}
          ],
          "title": "Spend (USD, last 24h, per model)",
          "type": "stat",
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "textMode": "value_and_name", "graphMode": "area", "colorMode": "value"}
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "currencyUSD"}},
          "gridPos": {"h": 7, "w": 8, "x": 8, "y": 31},
          "id": 11,
          "targets": [
            {"expr": "sum by (user) (increase(litellm_spend_metric_total[24h]))", "legendFormat": "{{user}}"}
          ],
          "title": "Spend (USD, last 24h, per user)",
          "type": "bargauge",
          "options": {"displayMode": "gradient", "orientation": "horizontal"}
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "short"}},
          "gridPos": {"h": 7, "w": 8, "x": 16, "y": 31},
          "id": 12,
          "targets": [
            {"expr": "sum by (model, hashed_api_key) (increase(litellm_total_tokens_metric_total[1h]))", "legendFormat": "{{model}} | key {{hashed_api_key}}"}
          ],
          "title": "Tokens per key (last 1h)",
          "type": "table"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"mappings": [{"options": {"0": {"color": "green", "text": "healthy"}, "1": {"color": "yellow", "text": "partial outage"}, "2": {"color": "red", "text": "complete outage"}}, "type": "value"}]}},
          "gridPos": {"h": 7, "w": 12, "x": 0, "y": 38},
          "id": 13,
          "targets": [
            {"expr": "litellm_deployment_state", "legendFormat": "{{litellm_model_name}} → {{api_base}}"}
          ],
          "title": "Upstream deployment state",
          "type": "stat",
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "textMode": "value_and_name", "colorMode": "background"}
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "short"}},
          "gridPos": {"h": 7, "w": 12, "x": 12, "y": 38},
          "id": 14,
          "targets": [
            {"expr": "litellm_in_flight_requests", "legendFormat": "in-flight (uvicorn)"}
          ],
          "title": "In-flight requests on the proxy",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["litellm", "llm", "proxy"],
      "templating": {"list": []},
      "time": {"from": "now-1h", "to": "now"},
      "title": "LiteLLM Proxy",
      "uid": "litellm-proxy",
      "version": 2,
      "weekStart": ""
    }
