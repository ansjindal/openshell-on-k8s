# Private in-cluster SKILL REGISTRY for the OpenClaw agent — a Verdaccio npm registry.
#
# Skills are OpenClaw plugins, which are npm packages, so a standard private npm registry is
# all you need. This is the single, governed source the sealed agent installs skills from:
# the sandbox egress policy (policies/openclaw-sandbox.yaml) allows ONLY this Service, and
# Verdaccio uplinks npmjs + caches transitive deps, so the agent never reaches the public
# internet directly. Skills enter here two ways — authored in-sandbox and `npm publish`ed,
# or vetted-and-mirrored from ClawHub by a curator (see web/src/content/skills.mdx).
#
# Reachable in-cluster at: registry.openshell.svc.cluster.local:4873
# The sandbox maps the @workshop scope (and its default registry) here via /sandbox/.npmrc,
# seeded by scripts/45-openclaw.sh.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-storage
  namespace: openshell
  labels: { app: registry, component: skill-registry }
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: registry-config
  namespace: openshell
  labels: { app: registry, component: skill-registry }
data:
  config.yaml: |
    # Verdaccio config — anonymous READ, authenticated PUBLISH, uplinks npmjs (cached).
    storage: /verdaccio/storage
    web:
      enable: true
      title: WeAreDevelopers · Private Skill Registry
    auth:
      htpasswd:
        file: /verdaccio/storage/htpasswd
        max_users: 1000
    uplinks:
      npmjs:
        url: https://registry.npmjs.org/
        cache: true
        maxage: 30m
    packages:
      '@*/*':
        access: $all
        publish: $authenticated
        unpublish: $authenticated
        proxy: npmjs
      '**':
        access: $all
        publish: $authenticated
        unpublish: $authenticated
        proxy: npmjs
    server:
      keepAliveTimeout: 60
    log: { type: stdout, format: pretty, level: http }
    listen: 0.0.0.0:4873
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: openshell
  labels: { app: registry, component: skill-registry }
spec:
  replicas: 1
  strategy: { type: Recreate }   # single RWO PVC — don't run two pods at once
  selector:
    matchLabels: { app: registry }
  template:
    metadata:
      labels: { app: registry, component: skill-registry }
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: verdaccio
          image: verdaccio/verdaccio:6
          ports:
            - containerPort: 4873
          readinessProbe:
            httpGet: { path: /-/ping, port: 4873 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /-/ping, port: 4873 }
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { memory: 512Mi }
          volumeMounts:
            - { name: storage, mountPath: /verdaccio/storage }
            - { name: config, mountPath: /verdaccio/conf }
      volumes:
        - name: storage
          persistentVolumeClaim: { claimName: registry-storage }
        - name: config
          configMap: { name: registry-config }
---
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: openshell
  labels: { app: registry, component: skill-registry }
spec:
  selector: { app: registry }
  ports:
    - { name: http, port: 4873, targetPort: 4873 }
