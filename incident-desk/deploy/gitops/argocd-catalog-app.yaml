apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: catalog
  namespace: argocd
spec:
  project: default
  source:
    repoURL: http://gitea.gitea.svc.cluster.local:3000/gitops/incident-gitops.git
    path: apps/catalog
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: demo-shop-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
