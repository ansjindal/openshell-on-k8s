# catalog-api — the ArgoCD/GitOps-managed twin of orders-api. It reuses the orders-api image.
# The fault: config.env sets CACHE_MB=400 which exceeds the 256Mi memory limit → Buffer.alloc
# OOMKills the process on startup → CrashLoopBackOff. server.js boots without a real DB (it warms
# the cache before the pool is used and retries postgres in the background), so the OOM is the only
# failure mode. The "raise-memory" fix depends on the exact literal string `memory: 256Mi` below.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-api
  labels: { app: catalog-api }
spec:
  replicas: 1
  selector: { matchLabels: { app: catalog-api } }
  template:
    metadata: { labels: { app: catalog-api } }
    spec:
      containers:
        - name: catalog-api
          image: incident-desk/orders-api:local
          imagePullPolicy: Never
          envFrom:
            - configMapRef: { name: catalog-config }
          env:
            - { name: OTEL_SERVICE_NAME, value: catalog-api }
            - { name: OTEL_EXPORTER_OTLP_ENDPOINT, value: "http://tempo.monitoring.svc.cluster.local:4318" }
          ports: [{ name: http, containerPort: 8080 }]
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: "1", memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-api
  labels: { app: catalog-api }
spec:
  selector: { app: catalog-api }
  ports: [{ name: http, port: 8080, targetPort: http }]
---
# ServiceMonitor for catalog-api — without it Prometheus never scrapes catalog-api, so the
# research-desk "Live system health" panel shows "—" for every metric even when faulted (the
# orders-api equivalent lives in demo-shop/deploy/demo-shop.yaml). Mirrors that one exactly:
# the `release: kps` label is what the kube-prometheus-stack Prometheus selects ServiceMonitors
# by; it scrapes the `http` port's /metrics (the orders-api image catalog-api reuses exposes
# Prometheus metrics there). Shipped via the catalog Kustomize app so ArgoCD syncs it AND a
# fresh launch comes up with catalog-api scraped.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata: { name: catalog-api, labels: { release: kps } }
spec:
  namespaceSelector: { matchNames: [demo-shop-gitops] }
  selector: { matchLabels: { app: catalog-api } }
  endpoints: [{ port: http, path: /metrics, interval: 10s }]
