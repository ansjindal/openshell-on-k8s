# Mailpit — the in-cluster SMTP sink + web inbox the Incident Desk's `sender` agent delivers the
# approved runbook to (the sender sandbox's egress is scoped to ONLY mailpit:1025). The web inbox
# (8025) is exposed behind Envoy at /mailpit so you can read what the agent sent.
apiVersion: v1
kind: Namespace
metadata: { name: research-desk }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: mailpit, namespace: research-desk, labels: { app: mailpit } }
spec:
  replicas: 1
  selector: { matchLabels: { app: mailpit } }
  template:
    metadata: { labels: { app: mailpit } }
    spec:
      containers:
        - name: mailpit
          image: axllent/mailpit:latest
          # MP_WEBROOT makes Mailpit serve its UI/assets/API/websocket under /mailpit
          # (data-webroot=/mailpit/), so the SPA's asset URLs match the Envoy /mailpit
          # route instead of 404ing at root. The web UI port (8025) only; SMTP (1025)
          # is unaffected — the sender agent still delivers to mailpit:1025.
          env:
            - { name: MP_WEBROOT, value: /mailpit }
          ports:
            - { name: smtp, containerPort: 1025 }
            - { name: http, containerPort: 8025 }
          # Probe must use the webroot-prefixed path now that MP_WEBROOT=/mailpit.
          readinessProbe: { httpGet: { path: /mailpit/readyz, port: http }, initialDelaySeconds: 5, periodSeconds: 5 }
---
apiVersion: v1
kind: Service
metadata: { name: mailpit, namespace: research-desk, labels: { app: mailpit } }
spec:
  selector: { app: mailpit }
  ports:
    - { name: smtp, port: 1025, targetPort: smtp }
    - { name: http, port: 8025, targetPort: http }
